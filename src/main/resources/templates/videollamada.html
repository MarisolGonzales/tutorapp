<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%93%3C/text%3E%3C/svg%3E">
  <title>Videollamada — TutorApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>

  <nav class="navbar-panel">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="logo-panel" th:href="@{${urlPanel}}">TutorApp</a>
      <div class="d-flex align-items-center gap-3">
        <span class="nombre-alumno">
          <i class="fa-solid fa-video"></i>
          <span th:text="${sesion.servicioTutor.curso.nombre}">Curso</span>
          &nbsp;·&nbsp;
          <span th:text="${sesion.fecha + ' · ' + sesion.hora}">Fecha</span>
        </span>
        <a th:href="@{${urlPanel}}" class="btn btn-outline-light btn-sm">
          <i class="fa-solid fa-arrow-left"></i> Volver al panel
        </a>
      </div>
    </div>
  </nav>

  <div class="container py-4">

    <div class="alert alert-success d-flex align-items-center gap-2" role="alert">
      <i class="fa-solid fa-circle-info"></i>
      <span>
        Sesión de <strong th:text="${sesion.servicioTutor.curso.nombre}">Curso</strong>
        entre <strong th:text="${sesion.servicioTutor.tutor.nombre}">Tutor</strong>
        y <strong th:text="${sesion.alumno.nombre}">Alumno</strong>.
        Si es la primera persona en entrar, Jitsi puede pedir iniciar sesión (un clic con Google) para moderar la sala.
      </span>
    </div>

    <div class="card">
      <div class="card-body p-2">
        <iframe th:src="'https://meet.jit.si/' + ${sesion.salaVideo} + '#config.prejoinConfig.enabled=true&userInfo.displayName=%22' + ${session.usuarioNombre} + '%22'"
                style="width:100%; height:75vh; border:0; border-radius:10px;"
                allow="camera; microphone; fullscreen; display-capture; autoplay">
        </iframe>
      </div>
    </div>

  </div>

  <footer>© 2026 TutorApp</footer>

</body>
</html>
