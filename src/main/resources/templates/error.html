<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ups — TutorApp</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%93%3C/text%3E%3C/svg%3E">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>

  <nav class="navbar-publica">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="nav-logo" th:href="@{/}">Tutor<span>App</span></a>
    </div>
  </nav>

  <div class="caja-error">
    <span class="emoji">🙈</span>
    <h2 th:text="${status != null and status == 404} ? 'Página no encontrada' : 'Algo salió mal'">Algo salió mal</h2>
    <p th:if="${status != null and status == 404}">La página que buscas no existe o cambió de lugar.</p>
    <p th:unless="${status != null and status == 404}">Ocurrió un error inesperado. Intenta de nuevo en unos segundos.</p>
    <a th:href="@{/}" class="btn btn-primary">
      <i class="fa-solid fa-house"></i> Volver al inicio
    </a>
  </div>

  <footer>© 2026 TutorApp</footer>

</body>
</html>
